version: '3.8'

services:
  db-server:
    build: ./database
    container_name: cruz_azul_db
    ports:
      - "5432:5432"
  environment:
    POSTGRES_DB: cruz_azul_db
    POSTGRES_USER: farmacia_user
    POSTGRES_PASSWORD: CruzAzul2024!
  volumes:
    - db_data:/var/lib/postgresql/data
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U farmacia_user -d cruz_azul_db"]
    interval: 10s
    timeout: 5s
    retries: 5
  restart: unless-stopped

volumes:
  db_data: